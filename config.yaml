# Load balancer configuration.
# Backend endpoints use AWS Cloud Map service-discovery DNS.
# The redis.addr field is overridden at runtime by the REDIS_ADDR
# environment variable injected via the ECS task definition.

load_balancer:
  port: 8080
  timeout: 5s

route:
  # Changeable per experiment: round-robin | least-connections | weighted
  policy: "round-robin"
  backends:
    - endpoint: "http://api.internal:8080"
      weight: 100

health_check:
  interval: 10s
  timeout: 5s

redis:
  addr: "redis:6379"
  password: ""
  db: 0